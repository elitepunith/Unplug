<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unplug</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="container">

    <div id="setup-section">
        <!-- tried adding a logo here earlier but it looked bad -->
        <h1 class="app-title">unplug.</h1>
        <input type="text" id="task-input" placeholder="what are you working on?" autocomplete="off" maxlength="60">
        <button id="start-btn">lock in</button>
    </div>

    <div id="focus-section" class="hidden">
        <p id="current-task"><span id="task-label">...</span></p>

        <div id="timer-display">00:00</div>

        <!-- maybe add a progress bar here later? idk -->
        <div class="stats-row">
            <span>interruptions:</span>
            <span id="interruption-count">0</span>
        </div>

        <p id="status-message" class="hidden">hey. you left. timer stopped.</p>
        <div class="btn-group">
          <button id="resume-btn" class="hidden">resume</button>
          <button id="end-btn">end</button>
        </div>
    </div>

</main>

<script src="js/main.js"></script>
</body>
</html>
