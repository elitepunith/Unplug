<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unplug </title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">
        <div id="setup-section">
            <input type="text" id="task-input" placeholder="What are you focusing on?" autocomplete="off">
            <button id="start-btn">Lock In</button>
        </div>

        <div id="focus-section" class="hidden">
            <p id="current-task">Focusing on: <span>...</span></p>
            <div id="timer-display">00:00</div>
            
            <div class="stats">
                <p>Interruptions: <span id="interruption-count">0</span></p>
            </div>

            <p id="status-message" class="hidden">Session paused. You left the tab.</p>
            <button id="resume-btn" class="hidden">Resume</button>
            <button id="end-btn">End Session</button>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
